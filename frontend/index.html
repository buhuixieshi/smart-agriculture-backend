<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧农业控制台</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">Ag</div>
        <div>
          <strong>智慧农业</strong>
          <span>后端联调前端</span>
        </div>
      </div>
      <nav id="nav"></nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">总览</h1>
          <p id="pageDesc">连接 Java 后端，查看数据并控制设备。</p>
        </div>
        <div class="top-actions">
          <label class="api-box">
            <span>后端地址</span>
            <input id="apiBase" value="http://localhost:8080" />
          </label>
          <button id="healthBtn" class="btn secondary">健康检查</button>
          <button id="refreshBtn" class="btn">刷新当前页</button>
        </div>
      </header>

      <section class="notice" id="notice">准备就绪</section>
      <section id="content" class="content"></section>
    </main>
  </div>

  <template id="loginTpl">
    <div class="grid two">
      <section class="panel">
        <h2>登录</h2>
        <div class="form-grid">
          <label>用户名<input id="loginUsername" placeholder="admin" /></label>
          <label>密码<input id="loginPassword" type="password" placeholder="password" /></label>
        </div>
        <div class="row">
          <button class="btn" data-action="login">登录</button>
          <button class="btn secondary" data-action="logout">退出登录</button>
        </div>
      </section>
      <section class="panel">
        <h2>注册</h2>
        <div class="form-grid">
          <label>用户名<input id="registerUsername" /></label>
          <label>昵称<input id="registerNickname" /></label>
          <label>密码<input id="registerPassword" type="password" /></label>
        </div>
        <button class="btn" data-action="register">注册</button>
      </section>
      <section class="panel wide">
        <h2>当前登录态</h2>
        <pre id="authState"></pre>
      </section>
    </div>
  </template>

  <template id="dashboardTpl">
    <div class="stats" id="stats"></div>
    <div class="grid two">
      <section class="panel">
        <div class="panel-head">
          <h2>地块最新遥测</h2>
          <select id="dashboardPlot"></select>
        </div>
        <div id="latestTelemetry" class="metric-grid"></div>
      </section>
      <section class="panel">
        <h2>在线/离线设备</h2>
        <div id="deviceSummary"></div>
      </section>
      <section class="panel wide">
        <h2>活跃告警</h2>
        <div id="activeAlarms"></div>
      </section>
    </div>
  </template>

  <template id="plotsTpl">
    <section class="panel">
      <h2>地块管理</h2>
      <div class="form-grid six">
        <input id="plotId" placeholder="修改时填 ID" />
        <input id="plotName" placeholder="地块名称" />
        <input id="plotCropType" placeholder="作物类型" />
        <input id="plotLocation" placeholder="位置" />
        <input id="plotArea" type="number" step="0.01" placeholder="面积" />
        <input id="plotStatus" placeholder="状态" />
        <input id="plotDescription" class="span2" placeholder="描述" />
      </div>
      <div class="row">
        <button class="btn" data-action="savePlot">新增/修改</button>
        <button class="btn danger" data-action="deletePlot">删除</button>
        <button class="btn secondary" data-action="clearPlotForm">清空</button>
      </div>
    </section>
    <section class="panel">
      <h2>地块列表</h2>
      <div id="plotsTable"></div>
    </section>
  </template>

  <template id="devicesTpl">
    <section class="panel">
      <h2>设备管理</h2>
      <div class="form-grid six">
        <input id="deviceId" placeholder="修改时填 ID" />
        <input id="deviceCode" placeholder="设备编号" />
        <input id="deviceName" placeholder="设备名称" />
        <input id="deviceType" placeholder="设备类型" />
        <select id="devicePlotId"></select>
        <input id="deviceStatus" placeholder="状态 ONLINE/OFFLINE" />
        <input id="deviceSignal" type="number" placeholder="信号" />
        <input id="deviceBattery" type="number" placeholder="电量" />
      </div>
      <div class="row">
        <button class="btn" data-action="saveDevice">新增/修改</button>
        <button class="btn secondary" data-action="bindDevice">绑定地块</button>
        <button class="btn secondary" data-action="unbindDevice">解绑</button>
        <button class="btn secondary" data-action="enableDevice">启用</button>
        <button class="btn warning" data-action="disableDevice">停用</button>
        <button class="btn danger" data-action="deleteDevice">删除</button>
      </div>
    </section>
    <section class="panel">
      <h2>设备列表</h2>
      <div id="devicesTable"></div>
    </section>
  </template>

  <template id="telemetryTpl">
    <section class="panel">
      <h2>遥测数据</h2>
      <div class="row">
        <select id="telemetryPlot"></select>
        <input id="telemetryDeviceId" placeholder="deviceId 可选" />
        <button class="btn" data-action="loadTelemetry">查询</button>
        <button class="btn secondary" data-action="simulateReport">模拟 HTTP 上报</button>
      </div>
      <div class="metric-grid" id="telemetryLatest"></div>
      <div id="telemetryHistory"></div>
    </section>
  </template>

  <template id="controlTpl">
    <div class="grid two">
      <section class="panel">
        <h2>水泵控制</h2>
        <div class="form-grid">
          <select id="controlDevice"></select>
          <select id="pumpAction">
            <option value="PUMP_ON">打开水泵</option>
            <option value="PUMP_OFF">关闭水泵</option>
          </select>
          <input id="durationSeconds" type="number" placeholder="持续秒数，可选" />
        </div>
        <button class="btn" data-action="sendPump">发送水泵命令</button>
      </section>
      <section class="panel">
        <h2>补光控制</h2>
        <div class="form-grid">
          <select id="lightDevice"></select>
          <select id="lightAction">
            <option value="ON">打开补光</option>
            <option value="OFF">关闭补光</option>
          </select>
          <input id="lightBrightness" type="number" min="0" max="100" placeholder="亮度 0-100" />
        </div>
        <button class="btn" data-action="sendLight">发送补光命令</button>
      </section>
      <section class="panel wide">
        <h2>控制记录</h2>
        <div class="row">
          <input id="commandDeviceCode" placeholder="deviceCode" />
          <button class="btn secondary" data-action="loadCommands">查询记录</button>
          <input id="commandNo" placeholder="commandNo" />
          <button class="btn secondary" data-action="loadCommandStatus">查命令状态</button>
        </div>
        <div id="commandsTable"></div>
      </section>
    </div>
  </template>

  <template id="strategiesTpl">
    <div class="grid two">
      <section class="panel">
        <h2>灌溉策略</h2>
        <div class="form-grid">
          <select id="strategyPlot"></select>
          <input id="moistureMin" type="number" step="0.01" placeholder="湿度下限" />
          <input id="moistureMax" type="number" step="0.01" placeholder="湿度上限" />
          <input id="consecutiveThreshold" type="number" placeholder="连续次数" />
          <input id="maxDuration" type="number" placeholder="最大灌溉秒数" />
          <input id="cooldownMinutes" type="number" placeholder="冷却分钟" />
          <label class="check"><input id="irrigationAuto" type="checkbox" /> 自动模式</label>
        </div>
        <button class="btn" data-action="saveIrrigationStrategy">保存灌溉策略</button>
      </section>
      <section class="panel">
        <h2>补光策略</h2>
        <div class="form-grid">
          <select id="lightStrategyPlot"></select>
          <input id="illuminanceMin" type="number" step="0.01" placeholder="照度下限" />
          <input id="illuminanceMax" type="number" step="0.01" placeholder="照度上限" />
          <input id="lightStartTime" type="time" />
          <input id="lightEndTime" type="time" />
          <input id="lightCooldown" type="number" placeholder="冷却分钟" />
          <label class="check"><input id="lightAuto" type="checkbox" /> 自动模式</label>
        </div>
        <button class="btn" data-action="saveLightStrategy">保存补光策略</button>
      </section>
    </div>
  </template>

  <template id="alarmsTpl">
    <section class="panel">
      <h2>告警管理</h2>
      <div class="row">
        <select id="alarmPlot"></select>
        <select id="alarmStatus">
          <option value="">全部状态</option>
          <option value="ACTIVE">ACTIVE</option>
          <option value="ACKNOWLEDGED">ACKNOWLEDGED</option>
          <option value="CLOSED">CLOSED</option>
          <option value="RECOVERED">RECOVERED</option>
        </select>
        <input id="alarmType" placeholder="告警类型" />
        <button class="btn" data-action="loadAlarms">查询</button>
      </div>
      <div id="alarmsTable"></div>
    </section>
  </template>

  <template id="aiTpl">
    <section class="panel">
      <h2>智能农事助手</h2>
      <div class="row">
        <select id="aiPlot"></select>
        <select id="aiDevice"></select>
        <input id="aiMessage" class="grow" placeholder="例如：当前地块需要灌溉吗？或者：跳转到设备管理页面" />
        <button class="btn" data-action="askAi">发送</button>
      </div>
      <div id="aiAnswer" class="chat-box"></div>
    </section>
  </template>

  <template id="pestTpl">
    <section class="panel">
      <h2>害虫识别</h2>
      <div class="row">
        <select id="pestPlot"></select>
        <input id="pestFile" type="file" accept="image/*" />
        <button class="btn" data-action="detectPest">上传识别</button>
      </div>
      <pre id="pestResult"></pre>
      <h2>识别记录</h2>
      <div id="pestRecords"></div>
    </section>
  </template>

  <template id="waterTpl">
    <div class="grid two">
      <section class="panel">
        <h2>用水限制</h2>
        <div class="form-grid">
          <select id="waterPlot"></select>
          <input id="dailyLimit" type="number" step="0.01" placeholder="单日上限" />
          <input id="monthlyLimit" type="number" step="0.01" placeholder="单月上限" />
          <input id="singleLimit" type="number" step="0.01" placeholder="单次上限" />
          <input id="alertPercent" type="number" step="0.01" placeholder="提醒百分比" />
          <input id="minEffectiveDuration" type="number" placeholder="最低有效灌溉秒数" />
        </div>
        <button class="btn" data-action="saveWaterLimit">保存用水限制</button>
      </section>
      <section class="panel">
        <h2>用水限制列表</h2>
        <div id="waterLimitsTable"></div>
      </section>
    </div>
  </template>

  <template id="logsTpl">
    <section class="panel">
      <h2>操作日志</h2>
      <div class="row">
        <input id="logOperationType" placeholder="operationType" />
        <input id="logTarget" placeholder="target" />
        <input id="logResult" placeholder="result" />
        <input id="logOperatorName" placeholder="operatorName" />
        <button class="btn" data-action="loadLogs">查询日志</button>
      </div>
      <div id="logsTable"></div>
    </section>
  </template>

  <script src="./app.js"></script>
</body>
</html>
